<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동네병원 - UI 와이어프레임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
        /* 프레임 내부 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden flex justify-center">

<div class="w-[500px] h-screen bg-white shadow-2xl flex flex-col border-x border-gray-300 rounded-none overflow-hidden">

    <header class="h-16 border-b flex items-center px-4 shrink-0 bg-white z-20">
        <div class="w-8 h-8 mr-3 bg-purple-100 rounded-md flex items-center justify-center">
            <span class="text-purple-600 text-xs font-bold">🏥</span>
        </div>
        <div class="flex-1 bg-gray-50 rounded-full h-11 flex items-center px-4 border border-gray-100 text-gray-400">
            <span class="text-sm">🔍 어느 병원을 찾으시나요?</span>
        </div>
        <button class="ml-3 text-2xl text-gray-600">🔔</button>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar bg-white">
        <div class="p-8">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">스크롤 테스트</h2>
            <div class="space-y-6 text-gray-500 leading-relaxed">
                <p class="bg-blue-50 p-4 rounded-lg border border-blue-100 text-blue-700">
                    💡 이제 페이지에 접속하자마자 하단바가 보입니다! <br>
                    브라우저 높이가 변해도 하단바는 항상 맨 밑에 붙어 있습니다.
                </p>
                <script>
                    for(let i=1; i<=25; i++) {
                        document.write(`
                                <div class="border-b pb-4">
                                    <p class="font-medium text-slate-700">${i}. 병원 리스트가 들어갈 자리입니다.</p>
                                    <p class="text-sm text-gray-400">스크롤을 내려도 하단바는 고정되어 있습니다.</p>
                                </div>
                            `);
                    }
                </script>
            </div>
        </div>
    </main>

    <nav class="h-20 border-t bg-white flex justify-around items-center px-2 shrink-0 z-20 shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
        <button class="flex flex-col items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-[11px] font-bold text-slate-900">홈</span>
        </button>

        <button class="flex flex-col items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
            </svg>
            <span class="text-[11px] font-medium text-slate-400">저장</span>
        </button>

        <button class="flex flex-col items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-[11px] font-medium text-slate-400">내 주변</span>
        </button>

        <div class="relative">
            <button class="flex flex-col items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span class="text-[11px] font-medium text-slate-400">내 병원</span>
            </button>
            <span class="absolute top-0 -right-1 bg-[#FF4D12] text-white text-[9px] w-[15px] h-[15px] rounded-full flex items-center justify-center font-bold border border-white">N</span>
        </div>

        <button class="flex flex-col items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span class="text-[11px] font-medium text-slate-400">MY</span>
        </button>
    </nav>

</div>

</body>
</html>
